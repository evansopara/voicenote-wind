<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNote • Wind to Hear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .phone {
      width: 380px;
      height: 760px;
      background: #111111;
      border-radius: 60px;
      padding: 12px;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6),
                  0 0 0 12px #1a1a1a,
                  0 0 0 16px #111;
      position: relative;
      margin: 40px auto;
    }
    
    .screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
    }
    
    .dynamic-island {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #000;
      border-radius: 9999px;
      z-index: 50;
    }
    
    .memory-card {
      position: absolute;
      top: 110px;
      left: 30px;
      right: 30px;
      background: #f8f1e3;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      height: 380px;
      display: flex;
      flex-direction: column;
    }
    
    .crank-container {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 140px;
      cursor: grab;
      user-select: none;
    }
    
    .crank-svg {
      transition: none;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.4));
    }
    
    .wave-bar {
      animation: soundwave 1.2s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex flex-col items-center justify-center py-8">
  <!-- Header caption -->
  <div class="max-w-md text-center mb-8 px-6">
    <p class="text-white text-2xl leading-tight font-medium">
      made a voicenote app that you have to keep winding to hear the voicenote ~ 🎵
    </p>
  </div>

  <!-- Phone Mockup -->
  <div class="phone">
    <div class="screen">
      <!-- Dynamic Island -->
      <div class="dynamic-island"></div>

      <!-- Status Bar -->
      <div class="absolute top-0 left-0 right-0 h-12 flex items-end px-8 text-white text-xs z-40">
        <div class="flex-1 flex justify-between">
          <div>9:39</div>
          <div class="flex items-center gap-3">
            <span>📶</span>
            <span>LTE</span>
            <span>92%</span>
          </div>
        </div>
      </div>

      <!-- Memory Content -->
      <div class="memory-card">
        <!-- Header -->
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2 text-[#1a1a1a]">
            <div class="w-3 h-3 bg-[#f59e0b] rounded-full"></div>
            <span class="font-semibold text-lg">New memory</span>
          </div>
          <div class="text-[#1a1a1a] text-sm font-medium">0:00 / 0:27</div>
        </div>

        <!-- Photo + Waveform -->
        <div class="flex-1 flex gap-4 bg-white rounded-2xl p-3 shadow-inner">
          <!-- Photo -->
          <div class="flex-1 bg-[#f1f1f1] rounded-xl overflow-hidden relative">
            <img 
              src="https://picsum.photos/id/1015/400/260" 
              alt="Memory photo"
              class="w-full h-full object-cover">
            <div class="absolute bottom-3 left-3 bg-black/70 text-white text-[10px] px-2 py-0.5 rounded font-mono">
              sunesthurs
            </div>
          </div>

          <!-- Waveform -->
          <div class="flex-1 flex items-end gap-[3px] h-full pb-4">
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[12%]" style="animation-delay: 0ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[35%]" style="animation-delay: 80ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[65%]" style="animation-delay: 160ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[88%]" style="animation-delay: 240ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[42%]" style="animation-delay: 320ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[78%]" style="animation-delay: 100ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[55%]" style="animation-delay: 220ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[92%]" style="animation-delay: 40ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[28%]" style="animation-delay: 300ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[70%]" style="animation-delay: 180ms"></div>
            <div class="wave-bar bg-[#ec4899] w-[5px] h-[45%]" style="animation-delay: 120ms"></div>
          </div>
        </div>
      </div>

      <!-- Crank -->
      <div class="crank-container" id="crank-wrapper">
        <svg id="crank" width="140" height="140" viewBox="0 0 140 140" class="crank-svg" xmlns="http://www.w3.org/2000/svg">
          <!-- Shaft base -->
          <circle cx="70" cy="70" r="14" fill="#e5e5e5" stroke="#444" stroke-width="10"/>
          <!-- Shaft -->
          <line id="shaft" x1="70" y1="70" x2="118" y2="70" stroke="#d1d5db" stroke-width="18" stroke-linecap="round"/>
          <!-- Knob (the part you grab) -->
          <circle id="knob" cx="118" cy="70" r="22" fill="#e5e5e5" stroke="#444" stroke-width="12"/>
          <!-- Highlight on knob -->
          <circle cx="118" cy="70" r="10" fill="#f8f8f8" opacity="0.4"/>
          <!-- Center screw detail -->
          <circle cx="70" cy="70" r="6" fill="#444"/>
        </svg>
      </div>

      <!-- Bottom label -->
      <div class="absolute bottom-8 left-0 right-0 text-center">
        <p class="text-white/70 text-sm font-medium tracking-widest">KEEP WINDING TO PLAY • ANTICLOCKWISE = REVERSE</p>
      </div>
    </div>
  </div>

  <!-- Audio element (hidden) -->
  <audio id="voicenote" preload="metadata">
    <!-- REPLACE THIS WITH YOUR OWN AUDIO FILE -->
    <!-- Example public domain short clip (you can replace the src) -->
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-18.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    // Tailwind script already loaded
    const audio = document.getElementById('voicenote')
    const crank = document.getElementById('crank')
    const wrapper = document.getElementById('crank-wrapper')
    
    let isDragging = false
    let rotation = 0
    let lastAngle = 0
    let lastTime = 0
    let currentTimeEl = null

    // Find the timestamp element
    function updateTimestamp() {
      const timeDisplay = document.querySelector('.memory-card > div:first-child > div:last-child')
      if (!timeDisplay) return
      
      const current = Math.floor(audio.currentTime)
      const total = Math.floor(audio.duration) || 27
      
      const format = (sec) => `${Math.floor(sec / 60)}:${(sec % 60).toString().padStart(2, '0')}`
      timeDisplay.textContent = `${format(current)} / ${format(total)}`
    }

    // Calculate angle from center of crank
    function getAngle(clientX, clientY) {
      const rect = wrapper.getBoundingClientRect()
      const cx = rect.left + rect.width / 2
      const cy = rect.top + rect.height / 2
      const dx = clientX - cx
      const dy = clientY - cy
      return Math.atan2(dy, dx) * (180 / Math.PI)
    }

    // Pointer events for mouse + touch
    function startDrag(e) {
      isDragging = true
      const clientX = e.clientX || (e.touches && e.touches[0].clientX)
      const clientY = e.clientY || (e.touches && e.touches[0].clientY)
      lastAngle = getAngle(clientX, clientY)
      lastTime = Date.now()
      audio.play().catch(() => {})
      wrapper.style.cursor = 'grabbing'
    }

    function duringDrag(e) {
      if (!isDragging) return
      
      const clientX = e.clientX || (e.touches && e.touches[0].clientX)
      const clientY = e.clientY || (e.touches && e.touches[0].clientY)
      
      const currentAngle = getAngle(clientX, clientY)
      let deltaAngle = currentAngle - lastAngle
      
      // Normalize delta to shortest rotation
      if (deltaAngle > 180) deltaAngle -= 360
      if (deltaAngle < -180) deltaAngle += 360
      
      const now = Date.now()
      const deltaTime = Math.max(now - lastTime, 16)
      
      // Angular velocity in degrees per millisecond
      const velocity = deltaAngle / deltaTime
      
      // Apply rotation
      rotation += deltaAngle
      crank.style.transform = `rotate(${rotation}deg)`
      
      // Control audio based on winding
      if (Math.abs(velocity) > 0.008) {
        const direction = Math.sign(velocity)
        // Speed feels natural when winding fast
        let speed = Math.min(3.5, Math.abs(velocity) * 65)
        speed = Math.max(0.6, speed)
        
        audio.playbackRate = direction * speed
        
        if (audio.paused) audio.play()
      } else {
        audio.pause()
      }
      
      lastAngle = currentAngle
      lastTime = now
      
      // Live timestamp update
      updateTimestamp()
    }

    function endDrag() {
      if (!isDragging) return
      isDragging = false
      audio.pause()
      wrapper.style.cursor = 'grab'
    }

    // Attach all events
    wrapper.addEventListener('mousedown', startDrag)
    window.addEventListener('mousemove', duringDrag)
    window.addEventListener('mouseup', endDrag)
    window.addEventListener('mouseleave', endDrag)

    // Touch support
    wrapper.addEventListener('touchstart', startDrag)
    window.addEventListener('touchmove', duringDrag)
    window.addEventListener('touchend', endDrag)

    // Audio ended or metadata loaded
    audio.addEventListener('loadedmetadata', updateTimestamp)
    audio.addEventListener('timeupdate', updateTimestamp)
    
    // Optional: loop the audio when it ends (demo friendly)
    audio.addEventListener('ended', () => {
      audio.currentTime = 0
    })

    console.log('%c✅ VoiceNote winding app ready! Replace the audio src with your own voicenote file.', 'color:#ec4899; font-weight:600')
  </script>
</body>
</html>
