<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoiceNote • Wind to Hear</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
    }
    
    .phone {
      width: 380px;
      height: 760px;
      background: #111111;
      border-radius: 60px;
      padding: 12px;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6),
                  0 0 0 12px #1a1a1a,
                  0 0 0 16px #111;
      position: relative;
      margin: 40px auto;
    }
    
    .screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
    }
    
    .dynamic-island {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #000;
      border-radius: 9999px;
      z-index: 50;
    }
    
    .memory-card {
      position: absolute;
      top: 110px;
      left: 30px;
      right: 30px;
      background: #f8f1e3;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      height: 380px;
      display: flex;
      flex-direction: column;
    }
    
    .crank-container {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 140px;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    
    .crank-svg {
      transition: none;
      filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.4));
    }
  </style>
</head>
<body class="bg-[#0a0a0a] min-h-screen flex flex-col items-center justify-center py-8">
  <div class="max-w-md text-center mb-8 px-6">
    <p class="text-white text-2xl leading-tight font-medium">
      made a voicenote app that you have to keep winding to hear the voicenote ~ 🎵
    </p>
  </div>

  <div class="phone">
    <div class="screen">
      <div class="dynamic-island"></div>

      <!-- Status Bar -->
      <div class="absolute top-0 left-0 right-0 h-12 flex items-end px-8 text-white text-xs z-40">
        <div class="flex-1 flex justify-between">
          <div>9:39</div>
          <div class="flex items-center gap-3">
            <span>📶</span>
            <span>LTE</span>
            <span>92%</span>
          </div>
        </div>
      </div>

      <!-- Memory Content -->
      <div class="memory-card">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-2 text-[#1a1a1a]">
            <div class="w-3 h-3 bg-[#f59e0b] rounded-full"></div>
            <span class="font-semibold text-lg">New memory</span>
          </div>
          <div id="timestamp" class="text-[#1a1a1a] text-sm font-medium">0:00 / 0:27</div>
        </div>

        <!-- Photo + Waveform -->
        <div class="flex-1 flex gap-4 bg-white rounded-2xl p-3 shadow-inner">
          <div class="flex-1 bg-[#f1f1f1] rounded-xl overflow-hidden relative">
            <img src="https://picsum.photos/id/1015/400/260" alt="Memory" class="w-full h-full object-cover">
            <div class="absolute bottom-3 left-3 bg-black/70 text-white text-[10px] px-2 py-0.5 rounded font-mono">
              sunesthurs
            </div>
          </div>
          <div class="flex-1 flex items-end gap-[3px] h-full pb-4">
            <!-- Fake waveform bars -->
            <div class="bg-[#ec4899] w-[5px] h-[20%] rounded"></div>
            <div class="bg-[#ec4899] w-[5px] h-[45%] rounded"></div>
            <div class="bg-[#ec4899] w-[5px] h-[75%] rounded"></div>
            <div class="bg-[#ec4899] w-[5px] h-[95%] rounded"></div>
            <div class="bg-[#ec4899] w-[5px] h-[55%] rounded"></div>
          </div>
        </div>
      </div>

      <!-- Crank -->
      <div class="crank-container" id="crank-wrapper">
        <svg id="crank" width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
          <circle cx="70" cy="70" r="14" fill="#e5e5e5" stroke="#444" stroke-width="10"/>
          <line id="shaft" x1="70" y1="70" x2="118" y2="70" stroke="#d1d5db" stroke-width="18" stroke-linecap="round"/>
          <circle id="knob" cx="118" cy="70" r="22" fill="#e5e5e5" stroke="#444" stroke-width="12"/>
          <circle cx="118" cy="70" r="10" fill="#f8f8f8" opacity="0.4"/>
          <circle cx="70" cy="70" r="6" fill="#444"/>
        </svg>
      </div>

      <div class="absolute bottom-8 left-0 right-0 text-center">
        <p class="text-white/70 text-sm font-medium tracking-widest">KEEP WINDING CLOCKWISE TO PLAY • ANTICLOCKWISE TO REVERSE</p>
      </div>
    </div>
  </div>

  <audio id="voicenote" preload="metadata">
    <!-- REPLACE THIS WITH YOUR OWN AUDIO -->
    <!-- Option 1: Direct MP3 link (recommended) -->
    <!-- <source src="https://your-direct-mp3-link.mp3" type="audio/mpeg"> -->
    
    <!-- Option 2: If using Google Drive, use this format (replace FILE_ID) -->
    <source src="https://drive.google.com/uc?export=download&id=1PS-TpMxuxMinFK9PlKLU9mrwRHJqilhl" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('voicenote');
    const crank = document.getElementById('crank');
    const wrapper = document.getElementById('crank-wrapper');
    const timestampEl = document.getElementById('timestamp');

    let isDragging = false;
    let rotation = 0;
    let lastAngle = 0;
    let lastTime = 0;
    let hasUserInteracted = false;

    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec.toString().padStart(2, '0')}`;
    }

    function updateTimestamp() {
      if (!audio.duration) return;
      timestampEl.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
    }

    function getAngle(clientX, clientY) {
      const rect = wrapper.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      return Math.atan2(dy, dx) * (180 / Math.PI);
    }

    function unlockAudio() {
      if (hasUserInteracted) return;
      hasUserInteracted = true;
      audio.muted = false;
      audio.play().catch(() => {});
    }

    function startDrag(e) {
      unlockAudio();
      isDragging = true;
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      lastAngle = getAngle(clientX, clientY);
      lastTime = Date.now();
      wrapper.style.cursor = 'grabbing';
    }

    function duringDrag(e) {
      if (!isDragging) return;

      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      
      const currentAngle = getAngle(clientX, clientY);
      let delta = currentAngle - lastAngle;
      if (delta > 180) delta -= 360;
      if (delta < -180) delta += 360;

      const now = Date.now();
      const deltaTime = Math.max(now - lastTime, 16);
      const velocity = delta / deltaTime;   // degrees per ms

      rotation += delta;
      crank.style.transform = `rotate(${rotation}deg)`;

      if (Math.abs(velocity) > 0.01) {
        let speed = Math.min(4, Math.abs(velocity) * 80);
        speed = Math.max(0.7, speed);
        audio.playbackRate = Math.sign(velocity) * speed;

        if (audio.paused) {
          audio.play().catch(() => {});
        }
      } else {
        audio.pause();
      }

      lastAngle = currentAngle;
      lastTime = now;
      updateTimestamp();
    }

    function endDrag() {
      isDragging = false;
      audio.pause();
      wrapper.style.cursor = 'grab';
    }

    // Events
    wrapper.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', duringDrag);
    window.addEventListener('mouseup', endDrag);

    wrapper.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', duringDrag);
    window.addEventListener('touchend', endDrag);

    audio.addEventListener('timeupdate', updateTimestamp);
    audio.addEventListener('loadedmetadata', updateTimestamp);
    audio.addEventListener('ended', () => { audio.currentTime = 0; });

    // First tap anywhere unlocks audio on mobile
    document.body.addEventListener('touchstart', unlockAudio, { once: true });
  </script>
</body>
</html>
